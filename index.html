<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#46178f 0%,#7b1fa2 45%,#e21b3c 100%);
overflow:hidden;

}

/* Fondo decorativo */

body::before{

content:"";
position:absolute;
width:700px;
height:700px;
border-radius:50%;
background:rgba(255,255,255,.05);
top:-250px;
right:-250px;

}

body::after{

content:"";
position:absolute;
width:600px;
height:600px;
border-radius:50%;
background:rgba(255,255,255,.04);
bottom:-220px;
left:-220px;

}

/* Tarjeta */

.card{

position:relative;
z-index:2;

width:90%;
max-width:470px;

padding:45px;

border-radius:24px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(18px);

box-shadow:
0 20px 60px rgba(0,0,0,.35);

display:flex;
flex-direction:column;
align-items:center;

animation:fade .6s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

font-size:60px;
margin-bottom:15px;

}

h1{

color:white;
font-size:46px;
font-weight:900;
letter-spacing:1px;

}

.sub{

margin-top:10px;
margin-bottom:30px;

color:#F4F4F4;
font-size:18px;
text-align:center;
line-height:1.5;

}

/* Input */

input{

width:100%;

padding:18px;

border-radius:14px;

border:3px solid transparent;

font-size:19px;

outline:none;

transition:.25s;

text-align:center;

}

input:focus{

border-color:#FFD54F;

}

.errorInput{

border-color:#ff5252 !important;

}

#error{

width:100%;
min-height:22px;

margin-top:10px;

font-size:15px;

font-weight:bold;

color:#FFD6D6;

opacity:0;

transition:.25s;

text-align:center;

}

#error.show{

opacity:1;

}

/* Botón */

button{

margin-top:18px;

width:100%;

padding:18px;

border:none;

border-radius:14px;

background:#111;

color:white;

font-size:21px;

font-weight:bold;

cursor:pointer;

transition:.2s;

}

button:hover{

transform:translateY(-3px);

box-shadow:0 12px 25px rgba(0,0,0,.35);

}

button:active{

transform:scale(.98);

}

.footer{

margin-top:25px;

font-size:13px;

opacity:.8;

color:white;

}

</style>
</head>

<body>

<div class="card">

<div class="logo">🧠</div>

<h1>TRIVIA</h1>

<div class="sub">

Pon a prueba tus conocimientos.<br>
Ingresa tus nombres y apellidos para comenzar.

</div>

<input
id="nombre"
type="text"
placeholder="Nombres y apellidos"
maxlength="80"
autocomplete="off"
>

<div id="error"></div>

<button onclick="start()">
COMENZAR
</button>

<div class="footer">
¡Muchos éxitos!
</div>

</div>

<script>

const input=document.getElementById("nombre");
const error=document.getElementById("error");

input.addEventListener("input",()=>{

let texto=input.value.replace(/\s+/g," ").trimStart();

input.value=texto;

if(texto.split(" ").filter(x=>x).length>=2){

error.classList.remove("show");
input.classList.remove("errorInput");

}

});

input.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

start();

}

});

function start(){

let nombre=input.value.trim().replace(/\s+/g," ");

if(nombre.split(" ").filter(x=>x).length<2){

error.innerHTML="⚠️ Por favor ingresa tus nombres y apellidos.";
error.classList.add("show");
input.classList.add("errorInput");
input.focus();

return;

}

window.location.href="game.html?nombre="+encodeURIComponent(nombre);

}

</script>

</body>
</html>
